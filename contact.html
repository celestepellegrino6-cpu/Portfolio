<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio UI-UX - Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="nav">
      <div class="nav-social">
        <a href="#" aria-label="LinkedIn">🔗</a>
        <a href="#" aria-label="Twitter">🐦</a>
        <a href="#" aria-label="Instagram">📷</a>
      </div>
      <div class="nav-logo">Portfolio UI-UX</div>
      <button class="nav-action">Contact</button>
      <button class="nav-burger" aria-label="Menu">☰</button>
    </nav>
    <div class="nav-overlay">
      <button class="nav-close" aria-label="Fermer">✕</button>
      <a href="index.html">Accueil</a>
      <a href="galerie-projets.html">Projets</a>
      <a href="a-propos.html">À propos</a>
      <button class="nav-action">Contact</button>
    </div>
  </header>
  <main>
    <section class="contact">
      <h1 class="contact-title">Me contacter</h1>
      <form class="contact-form">
        <div class="contact-group">
          <label for="name" class="contact-label">Nom</label>
          <input type="text" id="name" name="name" class="contact-input" required>
        </div>
        <div class="contact-group">
          <label for="email" class="contact-label">Email</label>
          <input type="email" id="email" name="email" class="contact-input" required>
        </div>
        <div class="contact-group">
          <label for="message" class="contact-label">Message</label>
          <textarea id="message" name="message" class="contact-textarea" required></textarea>
        </div>
        <button type="submit" class="contact-submit">Envoyer</button>
      </form>
    </section>
  </main>
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-logo">Portfolio UI-UX</div>
      <div class="footer-links">
        <a href="index.html">Accueil</a>
        <a href="galerie-projets.html">Projets</a>
        <a href="a-propos.html">À propos</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="footer-social">
        <a href="#" aria-label="LinkedIn">🔗</a>
        <a href="#" aria-label="Twitter">🐦</a>
        <a href="#" aria-label="Instagram">📷</a>
      </div>
      <p class="footer-copyright">© 2023 Portfolio UI-UX. Tous droits réservés.</p>
    </div>
  </footer>
  <script src="menu.js"></script>
</body>
</html>
